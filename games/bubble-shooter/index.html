<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Shooter Game | ❤️ mahsua.com</title>
    <link rel="icon" href="../../favicon.png" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="score-info">
                <div>Score: <span id="score">0</span></div>
                <div>Bubbles: <span id="bubbles-left">0</span></div>
            </div>
            <div class="level-info">Level <span id="current-level">1</span></div>
        </div>
        
        <div class="game-area" id="game-area">
            <div class="trajectory" id="trajectory"></div>
            <div class="shooter-area">
                <div class="next-bubble" id="next-bubble"></div>
                <div class="shooter" id="shooter"></div>
                <button class="swap-button" id="swap-button">Swap</button>
            </div>
        </div>

        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="final-score">0</span></p>
            <button class="restart-btn" onclick="restartGame()">Play Again</button>
        </div>

        <div class="level-complete" id="level-complete">
            <h2>Level Complete!</h2>
            <p>Great job! Score: <span id="level-score">0</span></p>
            <p style="font-size: 14px; opacity: 0.8; margin-top: 10px;">Next level starting automatically...</p>
            <button class="next-level-btn" onclick="nextLevel()" style="margin-top: 15px;">Skip Wait</button>
        </div>
    </div>

    <script src="script.js"></script>
