<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Racing Game | ❤️ mahsua.com</title>
    <link rel="icon" href="../../favicon.png" type="image/svg+xml">
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="road">
            <!-- Road lines will be generated by JavaScript -->
        </div>
        
        <div class="mouse-control-area" id="mouseArea"></div>
        
        <div class="ui">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
            <div class="speed">Speed: <span id="speed">60</span> mph</div>
            <button class="sound-toggle" id="soundToggle">🔊 ON</button>
        </div>

        <div class="player-car">
            <div class="car-body">
                <div class="car-window"></div>
                <div class="car-wheel wheel-front-left"></div>
                <div class="car-wheel wheel-front-right"></div>
                <div class="car-wheel wheel-back-left"></div>
                <div class="car-wheel wheel-back-right"></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-btn" id="leftBtn"></div>
            <div class="control-btn" id="rightBtn"></div>
        </div>

        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <div class="final-score">Final Score: <span id="finalScore">0</span></div>
            <button class="restart-btn" onclick="restartGame()">Play Again</button>
        </div>
    </div>
    <footer>
        <div class="footer-links">
            <a href="../../index.html">Games</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
        <div class="footer-copyright">
            <p>© 2024 Mahsua Games. Play instantly, no downloads required!</p>
        </div>
    </footer>
