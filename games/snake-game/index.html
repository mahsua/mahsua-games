<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game | ❤️ mahsua.com</title>
    <link rel="icon" href="../../favicon.png" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Snake Game</h1>
        <canvas id="gameCanvas"></canvas>
        <div id="messageBox">
            <p>Game Over!</p>
            <p>Your score: <span id="finalScore">0</span></p>
            <p>Highest score: <span id="highScoreDisplay">0</span></p>
            <button id="restartBtn">Play Again</button>
        </div>
        <div class="score-board">
            Score: <span id="score">0</span><br>
            Highest Score: <span id="highScoreDisplay2">0</span>
        </div>
        <footer>
            © 2024 <a href="https://games.mahsua.com/" target="_blank">Mahsua Games</a>. All rights reserved.
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
